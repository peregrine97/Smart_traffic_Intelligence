# =============================================================================
# Smart Traffic Intelligence — Deploy Workflow (main branch)
# =============================================================================
# Triggers: Every push to main
# Jobs: full test suite → docker build & push → frontend build → readiness check
# =============================================================================

name: Deploy — Main Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

defaults:
  run:
    working-directory: Smart_traffic_Intelligence

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sti-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Full Backend Test Suite
  # ─────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🐍 Backend Full Test Suite
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.test-result.outputs.passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            Smart_traffic_Intelligence/backend/requirements.txt
            Smart_traffic_Intelligence/backend/requirements-dev.txt

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run full test suite
        id: run-tests
        run: |
          pytest backend/tests/ \
            -v \
            --tb=long \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=html:htmlcov \
            --junit-xml=test-results-backend.xml
        env:
          GROQ_API_KEY: "test-key-ci-mock"
          PYTHONPATH: "."

      - name: Set test result output
        id: test-result
        if: always()
        run: echo "passed=${{ steps.run-tests.outcome == 'success' }}" >> $GITHUB_OUTPUT

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-artifacts
          path: |
            Smart_traffic_Intelligence/test-results-backend.xml
            Smart_traffic_Intelligence/coverage-backend.xml
            Smart_traffic_Intelligence/htmlcov/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Full Frontend Test Suite
  # ─────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: ⚛️  Frontend Full Test Suite
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.test-result.outputs.passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Smart_traffic_Intelligence/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Smart_traffic_Intelligence/frontend
        run: npm ci

      - name: Run full test suite
        id: run-tests
        working-directory: Smart_traffic_Intelligence/frontend
        run: npm run test:ci
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          CI: "true"

      - name: Set test result output
        id: test-result
        if: always()
        run: echo "passed=${{ steps.run-tests.outcome == 'success' }}" >> $GITHUB_OUTPUT

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: Smart_traffic_Intelligence/frontend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker Image to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [backend-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: Smart_traffic_Intelligence
          file: Smart_traffic_Intelligence/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image digest
        run: echo "Image pushed — digest ${{ steps.docker-build.outputs.digest }}"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Frontend Production Build Verification
  # ─────────────────────────────────────────────────────────────────────────
  frontend-production-build:
    name: 🏗️  Frontend Production Build
    runs-on: ubuntu-latest
    needs: [frontend-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Smart_traffic_Intelligence/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Smart_traffic_Intelligence/frontend
        run: npm ci

      - name: Build production bundle
        working-directory: Smart_traffic_Intelligence/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://sti-backend.onrender.com' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: Smart_traffic_Intelligence/frontend/.next/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Deployment Readiness Check
  # ─────────────────────────────────────────────────────────────────────────
  deployment-readiness:
    name: ✅ Deployment Readiness
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, docker-build-push, frontend-production-build]
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          echo "=== Deployment Readiness Report ==="
          echo "Backend Tests:          ${{ needs.backend-tests.outputs.tests-passed }}"
          echo "Frontend Tests:         ${{ needs.frontend-tests.outputs.tests-passed }}"
          echo "Docker Build & Push:    ${{ needs.docker-build-push.result }}"
          echo "Frontend Prod Build:    ${{ needs.frontend-production-build.result }}"
          echo ""

          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "❌ Backend tests FAILED — deployment blocked"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "❌ Frontend tests FAILED — deployment blocked"
            exit 1
          fi
          if [[ "${{ needs.docker-build-push.result }}" != "success" ]]; then
            echo "❌ Docker build/push FAILED — deployment blocked"
            exit 1
          fi
          if [[ "${{ needs.frontend-production-build.result }}" != "success" ]]; then
            echo "❌ Frontend production build FAILED — deployment blocked"
            exit 1
          fi

          echo "✅ All checks passed — system is deployment-ready!"
          echo ""
          echo "📦 Backend image: ghcr.io/${{ github.repository_owner }}/sti-backend:latest"
          echo "🌐 Render auto-deploys from main (if render.yaml is configured)"
          echo "🔺 Vercel auto-deploys from main (if project is connected)"

      - name: Create deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Deployment Readiness Summary

          | Check | Status |
          |-------|--------|
          | Backend Tests | ${{ needs.backend-tests.result }} |
          | Frontend Tests | ${{ needs.frontend-tests.result }} |
          | Docker Build & Push | ${{ needs.docker-build-push.result }} |
          | Frontend Production Build | ${{ needs.frontend-production-build.result }} |

          ### Next Steps
          - **Render**: Will auto-deploy from the new Docker image at `ghcr.io/${{ github.repository_owner }}/sti-backend:latest`
          - **Vercel**: Will auto-deploy from the `main` branch push
          - **Health Check**: After deploy, verify `GET /health` returns `{"status": "ok"}`
          EOF
